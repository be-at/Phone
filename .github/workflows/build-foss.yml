name: Build Foss Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "RIGHT_APP_KEY=foss" >> local.properties
          echo "PRODUCT_ID_X1=foss" >> local.properties
          echo "PRODUCT_ID_X2=foss" >> local.properties
          echo "PRODUCT_ID_X3=foss" >> local.properties
          echo "SUBSCRIPTION_ID_X1=foss" >> local.properties
          echo "SUBSCRIPTION_ID_X2=foss" >> local.properties
          echo "SUBSCRIPTION_ID_X3=foss" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X1=foss" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X2=foss" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X3=foss" >> local.properties

      - name: Create keystore.properties
        run: |
          echo "keyAlias=mykey" >> keystore.properties
          echo "keyPassword=mypassword" >> keystore.properties
          echo "storeFile=../keystore.jks" >> keystore.properties
          echo "storePassword=mypassword" >> keystore.properties

      - name: Fix Gradle Wrapper
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Foss Release APK
        run: ./gradlew assembleFossRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: foss-release-apk
          path: app/build/outputs/apk/foss/release/*.apk
          retention-days: 30
